name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version to release (e.g. v0.6.0)"
        required: true

permissions:
  contents: write

jobs:
  # Reuse the full CI suite as a gate before publishing a release.
  validate:
    uses: ./.github/workflows/validate.yml

  release:
    name: Package & publish
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve version
        id: ver
        # Pass the dispatch input through the env, not direct ${{ }} shell
        # interpolation, so a crafted tag value can't inject shell commands.
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package marketplace artifact
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          pkg="analog-chip-design-agents-${tag}"
          mkdir -p "dist/${pkg}"
          # Ship the installable surface: the registry, every plugin, shared docs,
          # the installers, and the helper tools.
          cp -r .claude-plugin plugins docs tools install.sh install.ps1 \
                README.md LICENSE CHANGELOG.md "dist/${pkg}/"
          tar -czf "dist/${pkg}.tar.gz" -C dist "${pkg}"
          (cd dist && zip -rq "${pkg}.zip" "${pkg}")
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip

  npm-publish:
    name: Publish to npm
    needs: validate
    runs-on: ubuntu-latest
    # Publishes via npm OIDC trusted publishing — no NPM_TOKEN. The runner mints
    # a short-lived OIDC token (id-token: write) that npm exchanges for per-run
    # credentials, and provenance attestations are generated automatically. This
    # requires a trusted publisher configured for this repo/workflow on npmjs.com.
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # The publish job only reads, stamps locally, and runs `npm publish` —
          # it never pushes to git, so the GITHUB_TOKEN need not be persisted.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports OIDC trusted publishing
        # OIDC trusted publishing needs npm >= 11.5.1; Node 24 bundles an older npm.
        run: npm install -g npm@latest

      - name: Resolve version
        id: ver
        # Pass the dispatch input through the env, not direct ${{ }} shell
        # interpolation, so a crafted tag value can't inject shell commands.
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp tag version into package.json and manifests
        env:
          VERSION: ${{ steps.ver.outputs.tag }}
        run: |
          node -e "
          const fs = require('fs');
          const tag = process.env.VERSION.replace(/^v/, '');
          const stamp = (p, mut) => { const d = JSON.parse(fs.readFileSync(p)); mut(d); fs.writeFileSync(p, JSON.stringify(d, null, 2) + '\n'); };
          stamp('package.json', d => d.version = tag);
          stamp('.claude-plugin/marketplace.json', d => d.metadata.version = tag);
          for (const dir of fs.readdirSync('plugins')) {
            const p = 'plugins/' + dir + '/.claude-plugin/plugin.json';
            if (fs.existsSync(p)) stamp(p, d => d.version = tag);
          }
          console.log('Stamped version ' + tag);
          "

      - name: Publish to npm
        env:
          VERSION: ${{ steps.ver.outputs.tag }}
        run: |
          # Prerelease tags (rc/beta) publish under the "next" dist-tag so they
          # never overwrite "latest".
          TAG=latest
          case "$VERSION" in
            *rc*|*beta*) TAG=next ;;
          esac
          npm publish --access public --tag "$TAG"
