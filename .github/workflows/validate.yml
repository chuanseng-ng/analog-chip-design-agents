name: Validate Plugin

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_call:

jobs:
  validate:
    name: Validate Skills, Agents & Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate plugin.json
        run: |
          python3 -c "
          import json, os, glob
          repo_root = os.path.realpath(os.getcwd())
          manifests = sorted(glob.glob('plugins/*/.claude-plugin/plugin.json'))
          assert manifests, 'no plugin.json files found'
          for manifest in manifests:
              plugin_src = os.path.realpath(os.path.dirname(os.path.dirname(manifest)))
              d = json.load(open(manifest))
              assert 'name' in d, f'{manifest}: missing name'
              assert isinstance(d.get('skills'), list), f'{manifest}: skills must be array'
              assert isinstance(d.get('agents'), list), f'{manifest}: agents must be array'
              for raw in d['skills']:
                  resolved = os.path.realpath(os.path.join(plugin_src, raw))
                  assert resolved.startswith(repo_root + os.sep), f'{manifest}: skill path escapes repo: {raw!r}'
                  assert os.path.exists(resolved), f'{manifest}: skill path not found: {raw!r}'
              for raw in d['agents']:
                  resolved = os.path.realpath(os.path.join(plugin_src, raw))
                  assert resolved.startswith(repo_root + os.sep), f'{manifest}: agent path escapes repo: {raw!r}'
                  assert os.path.exists(resolved), f'{manifest}: agent path not found: {raw!r}'
              print(f'OK: {manifest} — name={d[\"name\"]}, skills={len(d[\"skills\"])}, agents={len(d[\"agents\"])}')
          print(f'All {len(manifests)} plugin.json files validated')
          "

      - name: Validate marketplace.json
        run: |
          python3 -c "
          import json, os
          d = json.load(open('.claude-plugin/marketplace.json'))
          repo_root = os.path.realpath(os.getcwd())
          assert isinstance(d.get('name'), str) and d['name'].strip(), 'marketplace.json: missing name'
          for p in d.get('plugins', []):
              assert isinstance(p, dict)
              assert isinstance(p.get('name'), str) and p['name'].strip()
              src = p.get('source', '')
              source_dir = os.path.realpath(os.path.join(repo_root, src))
              assert source_dir.startswith(repo_root + os.sep), f'plugin {p[\"name\"]!r} source escapes repo: {src!r}'
              assert os.path.isdir(source_dir), f'plugin {p[\"name\"]!r} source not found: {src!r}'
              assert os.path.isfile(os.path.join(source_dir, '.claude-plugin', 'plugin.json')), f'plugin {p[\"name\"]!r}: no .claude-plugin/plugin.json at source: {src!r}'
              for raw in p.get('skills', []):
                  resolved = os.path.realpath(os.path.join(source_dir, raw))
                  assert resolved.startswith(repo_root + os.sep), f'skill path escapes repo: {raw!r}'
                  assert os.path.isdir(resolved), f'skill path not a dir in {p[\"name\"]!r}: {raw!r}'
              for raw in p.get('agents', []):
                  resolved = os.path.realpath(os.path.join(source_dir, raw))
                  assert resolved.startswith(repo_root + os.sep), f'agent path escapes repo: {raw!r}'
                  assert os.path.isfile(resolved), f'agent path not a file in {p[\"name\"]!r}: {raw!r}'
          print(f'marketplace.json OK — {len(d.get(\"plugins\", []))} plugins, all paths verified')
          "

      - name: Validate all SKILL.md files
        run: |
          python3 << 'PYEOF'
          import sys, glob
          paths = sorted(glob.glob("plugins/*/skills/*/SKILL.md"))
          required_sections = ["## Purpose", "## Domain Rules", "## QoR Metrics", "## Output Required"]
          errors = []
          for path in paths:
              content = open(path).read()
              if not content.startswith("---"):
                  errors.append(f"{path}: no YAML frontmatter")
              for section in required_sections:
                  if section not in content:
                      errors.append(f"{path}: missing section '{section}'")
              print(f"OK: {path} ({len(content.splitlines())} lines)")
          if errors:
              for e in errors: print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          print(f"All {len(paths)} skill files validated")
          PYEOF

      - name: Validate all agent .md files
        run: |
          python3 << 'PYEOF'
          import sys, glob
          paths = sorted(glob.glob("plugins/*/agents/*.md"))
          required_fields = ["name:", "description:", "model:", "effort:", "maxTurns:"]
          errors = []
          for path in paths:
              content = open(path).read()
              if not content.startswith("---"):
                  errors.append(f"{path}: no YAML frontmatter")
              for field in required_fields:
                  if field not in content:
                      errors.append(f"{path}: missing frontmatter field '{field}'")
              if "## Stage Sequence" not in content:
                  errors.append(f"{path}: missing '## Stage Sequence' section")
              if "## Loop-Back Rules" not in content:
                  errors.append(f"{path}: missing '## Loop-Back Rules' section")
              print(f"OK: {path} ({len(content.splitlines())} lines)")
          if errors:
              for e in errors: print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          print(f"All {len(paths)} agent files validated")
          PYEOF

      - name: Check counts match marketplace registrations
        run: |
          python3 << 'PYEOF'
          import json, glob
          skill_count = len(glob.glob("plugins/*/skills/*/SKILL.md"))
          agent_count = len(glob.glob("plugins/*/agents/*.md"))
          mp = json.load(open(".claude-plugin/marketplace.json"))
          mp_count = len(mp.get("plugins", []))
          print(f"Skills: {skill_count} | Agents: {agent_count} | Marketplace entries: {mp_count}")
          # One orchestrator per plugin; one marketplace entry per plugin.
          # Skills may exceed plugins — infrastructure registers both
          # 'infrastructure' and 'memory-keeper'.
          assert agent_count == mp_count == 16, \
              f"Count mismatch — expected 16 agents and 16 marketplace entries: agents={agent_count}, marketplace={mp_count}"
          assert skill_count >= mp_count, \
              f"Fewer skills than plugins: skills={skill_count}, plugins={mp_count}"
          print("Count check PASSED")
          PYEOF

      - name: Validate design_state.json fixtures
        run: |
          python3 << 'PYEOF'
          import json, os, sys
          errors = []
          VALID_FORMAT_VERSIONS = {"1.0"}
          VALID_CONFIDENCE = {"high", "medium", "low"}
          VALID_HISTORY_FC = {"none", "functional", "spec_violation", "convergence", "matching",
                              "yield", "drc_lvs", "connectivity", "reliability", "tool_error",
                              "spec_gap", "resource_limit"}
          VALID_NEXT_STEP = {"proceed", "retry_stage", "escalate", "abandon"}
          VALID_RETRY_STRATEGY = {"none", "regenerate", "refine", "escalate"}
          RETRY_STRATEGY_MAP = {
              "none": "none", "functional": "refine", "spec_violation": "refine",
              "matching": "refine", "yield": "refine", "convergence": "regenerate",
              "drc_lvs": "regenerate", "connectivity": "refine", "reliability": "refine",
              "tool_error": "regenerate", "spec_gap": "escalate", "resource_limit": "escalate",
          }
          VALID_FR_FAILURE = {"spec_violation", "convergence", "functional", "yield", "drc_lvs", "connectivity"}
          VALID_FR_STATUS = {"open", "claimed", "fixed", "abandoned"}
          FR_REQUIRED = ["id", "created_at", "updated_at", "created_by", "failure_class",
                         "retry_strategy", "analysis_name", "spec_or_metric", "corner",
                         "waveform_path", "log_path", "suspected_circuit", "summary",
                         "expected_behavior", "observed_behavior", "session_id", "status",
                         "circuit_response", "history"]
          FR_SUSPECTED = ["block", "device", "netlist", "schematic_ref"]

          def check_history(hist, label, errs):
              if not isinstance(hist, list) or not hist:
                  errs.append(f"{label}: history[] must be a non-empty list")
                  return
              for i, h in enumerate(hist):
                  if not isinstance(h, dict):
                      errs.append(f"{label}.history[{i}] must be an object"); continue
                  if h.get("confidence") not in VALID_CONFIDENCE:
                      errs.append(f"{label}.history[{i}].confidence invalid: {h.get('confidence')!r}")
                  fc = h.get("failure_class")
                  if fc not in VALID_HISTORY_FC:
                      errs.append(f"{label}.history[{i}].failure_class invalid: {fc!r}")
                  sns = h.get("suggested_next_step")
                  if not (isinstance(sns, str) and (sns in VALID_NEXT_STEP or sns.startswith("loop_back_to:"))):
                      errs.append(f"{label}.history[{i}].suggested_next_step invalid: {sns!r}")
                  rs = h.get("retry_strategy")
                  if rs not in VALID_RETRY_STRATEGY:
                      errs.append(f"{label}.history[{i}].retry_strategy invalid: {rs!r}")
                  elif fc in RETRY_STRATEGY_MAP and rs != RETRY_STRATEGY_MAP[fc]:
                      errs.append(f"{label}.history[{i}].retry_strategy {rs!r} != mapped {RETRY_STRATEGY_MAP[fc]!r} for {fc!r}")

          base = "plugins/meta/skills/pipeline-orchestration/examples"

          # fix_request fixture
          frp = f"{base}/design_state.fix_request.json"
          if not os.path.isfile(frp):
              errors.append(f"missing fixture: {frp}")
          else:
              d = json.load(open(frp))
              if d.get("format_version") not in VALID_FORMAT_VERSIONS:
                  errors.append(f"{frp}: format_version must be in {sorted(VALID_FORMAT_VERSIONS)}, got {d.get('format_version')!r}")
              if not isinstance(d.get("pipeline_config"), dict) or "max_cross_domain_iterations" not in d.get("pipeline_config", {}):
                  errors.append(f"{frp}: pipeline_config.max_cross_domain_iterations required")
              frs = d.get("fix_requests")
              if not isinstance(frs, list) or not frs:
                  errors.append(f"{frp}: fix_requests must be a non-empty array")
              else:
                  for i, fr in enumerate(frs):
                      for f in FR_REQUIRED:
                          if f not in fr:
                              errors.append(f"{frp}: fix_requests[{i}] missing field '{f}'")
                      if fr.get("failure_class") not in VALID_FR_FAILURE:
                          errors.append(f"{frp}: fix_requests[{i}].failure_class {fr.get('failure_class')!r} not in {VALID_FR_FAILURE}")
                      if fr.get("status") not in VALID_FR_STATUS:
                          errors.append(f"{frp}: fix_requests[{i}].status {fr.get('status')!r} not in {VALID_FR_STATUS}")
                      if fr.get("retry_strategy") not in VALID_RETRY_STRATEGY:
                          errors.append(f"{frp}: fix_requests[{i}].retry_strategy invalid")
                      sc = fr.get("suspected_circuit", {})
                      for f in FR_SUSPECTED:
                          if f not in sc:
                              errors.append(f"{frp}: fix_requests[{i}].suspected_circuit missing '{f}'")
              check_history(d.get("history"), frp, errors)
              if not errors:
                  print(f"OK: {frp} — {len(frs)} fix_request(s), format_version={d['format_version']!r}")

          # checkpoint fixture
          ckp = f"{base}/design_state.checkpoint.json"
          if not os.path.isfile(ckp):
              errors.append(f"missing fixture: {ckp}")
          else:
              c = json.load(open(ckp))
              if c.get("format_version") not in VALID_FORMAT_VERSIONS:
                  errors.append(f"{ckp}: format_version must be in {sorted(VALID_FORMAT_VERSIONS)}, got {c.get('format_version')!r}")
              pc = c.get("pipeline_config", {})
              if not isinstance(pc.get("checkpoints"), list):
                  errors.append(f"{ckp}: pipeline_config.checkpoints must be a list")
              ac = c.get("approved_checkpoints")
              if not isinstance(ac, list):
                  errors.append(f"{ckp}: approved_checkpoints must be a list")
              else:
                  for i, e in enumerate(ac):
                      if not isinstance(e, dict) or "stage" not in e:
                          errors.append(f"{ckp}: approved_checkpoints[{i}] must be an object with 'stage'")
              pa = c.get("pending_approval")
              if pa is not None and pa.get("type") not in {"checkpoint", "escalation", "constraint_gap"}:
                  errors.append(f"{ckp}: pending_approval.type invalid: {pa.get('type')!r}")
              cons = c.get("constraints")
              if not isinstance(cons, dict) or "supply" not in cons or "specs" not in cons:
                  errors.append(f"{ckp}: constraints must include 'supply' and 'specs'")
              check_history(c.get("history"), ckp, errors)
              if not errors:
                  print(f"OK: {ckp} — format_version={c.get('format_version')!r}, {len(c.get('history', []))} history entries")

          if errors:
              for e in errors: print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          print("design_state fixtures OK")
          PYEOF

      - name: Validate infrastructure memory integration
        run: |
          python3 << 'PYEOF'
          import os, sys, importlib.util
          errors = []
          kb = "memory/infrastructure/knowledge.md"
          if not os.path.isfile(kb):
              errors.append(f"Missing: {kb}")
          elif os.path.getsize(kb) == 0:
              errors.append(f"{kb}: file is empty")
          else:
              print(f"OK: {kb}")
          distill_path = "plugins/infrastructure/skills/memory-keeper/distill.py"
          if not os.path.isfile(distill_path):
              errors.append(f"Missing: {distill_path}")
          else:
              spec = importlib.util.spec_from_file_location("distill", distill_path)
              mod = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(mod)
              if "infrastructure" not in mod.VALID_DOMAINS:
                  errors.append("distill.py VALID_DOMAINS missing 'infrastructure'")
              elif "infrastructure" not in mod.METRIC_FIELDS:
                  errors.append("distill.py METRIC_FIELDS missing 'infrastructure'")
              else:
                  print(f"OK: distill.py registers infrastructure ({mod.METRIC_FIELDS['infrastructure']})")
          if errors:
              for e in errors: print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          print("Infrastructure memory integration OK")
          PYEOF
